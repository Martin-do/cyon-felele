{% extends "base.html" %}
{% block title %}Server Error | CYON Harvest{% endblock %}

{% block content %}
<div class="glass-card" style="text-align: center; max-width: 500px; margin: 4rem auto; padding: 3rem 2rem;">
    <h1 style="font-size: 4rem; color: #E53E3E; margin: 0; line-height: 1;">500</h1>
    <h2 style="color: #FAF6EC; margin-bottom: 1rem; margin-top: 0.5rem;">Internal Server Error</h2>
    <p style="color: #A0AEC0; margin-bottom: 2rem;">Oops! Something went wrong on our end. Please try again later.</p>
    
    <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="{% url 'contributions:landing' %}" class="btn-secondary" style="padding: 0.75rem 1.5rem; text-decoration: none;">Go Home</a>
        <button onclick="window.location.reload()" class="btn-submit" style="padding: 0.75rem 1.5rem; margin-top: 0;">Try Again</button>
    </div>
</div>
{% endblock %}
